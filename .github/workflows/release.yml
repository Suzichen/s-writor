name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract changelog for current version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          awk -v tag="$TAG" '
            /^## \[/ { if (found) exit; if (index($0, tag)) found=1; next }
            found { print }
          ' CHANGELOG.md > /tmp/release_body.md
          # Fallback if empty
          if [ ! -s /tmp/release_body.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > /tmp/release_body.md
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PB_BASE_URL: ${{ vars.PB_BASE_URL }}
          DEPLOY_API_BASE_URL: ${{ vars.DEPLOY_API_BASE_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'S-Writor ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          releaseBodyPath: /tmp/release_body.md
